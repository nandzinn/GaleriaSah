<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar Galerias — Galeria da Sah</title>
  <meta name="description" content="Descubra galerias públicas de outros usuários na Galeria da Sah.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#070d1f">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Galeria da Sah">
  <meta property="og:title" content="Explorar Galerias — Galeria da Sah">
  <meta property="og:description" content="Descubra galerias públicas de outros usuários.">
  <meta property="og:image" content="https://galeria-online-72eda.web.app/og-cover.png">
  <meta property="og:url" content="https://galeria-online-72eda.web.app/explore.html">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Explorar Galerias — Galeria da Sah">
  <meta name="twitter:description" content="Descubra galerias públicas de outros usuários.">
  <meta name="twitter:image" content="https://galeria-online-72eda.web.app/og-cover.png">

  <!--
    ══════════════════════════════════════════════════════
    explore.html — FEED / EXPLORAR GALERIAS PÚBLICAS
    ══════════════════════════════════════════════════════
    Exibe um grid de cards com as galerias públicas de
    todos os usuários do sistema, ordenadas por mais
    recentes (createdAt desc), com limite de 40.

    Cada card exibe:
      • Thumbnail da primeira foto da galeria
      • Nome da galeria
      • Avatar + username do dono (link → public_profile.html)
      • Contador de fotos

    Estados da página:
    ┌───────────────────────────────────────────────────┐
    │  #stateLoading  → skeletons animados              │
    │  #stateEmpty    → nenhuma galeria pública ainda   │
    │  #stateGrid     → grid de cards (conteúdo real)   │
    └───────────────────────────────────────────────────┘
  -->

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <style>
    /* ═══ VARIÁVEIS DE COR — idênticas ao restante do projeto ═══════════ */
    :root {
      --bg-main:      #070d1f;
      --bg-surface:   #0c1324;
      --bg-card:      #131929;
      --color-primary:#adc6ff;
      --color-mid:    #748de1;
      --color-deep:   #4b8eff;
      --color-soft:   #b9c7e4;
      --text-main:    #dce1fb;
      --text-muted:   #c1c6d7;
      --text-dim:     #8b90a0;
      --rgb-primary:  173,198,255;
      --rgb-mid:      116,141,225;
      --error:        #ff6b6b;
      --success:      #4ade80;
      --header-h:     64px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
      user-select: none; line-height: 1; vertical-align: middle;
    }
    .icon-filled { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

    /* ═══ HEADER FIXO ════════════════════════════════════════════════════ */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(7,13,31,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(var(--rgb-primary),0.1);
      display: flex; align-items: center;
      padding: 0 20px; gap: 14px; z-index: 100;
    }
    /* Logo: link para gallery.html */
    .header-brand {
      display: flex; align-items: center; gap: 10px;
      flex: none; text-decoration: none;
    }
    .header-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(var(--rgb-primary),.2), rgba(var(--rgb-mid),.3));
      border: 1px solid rgba(var(--rgb-primary),.25);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-primary);
    }
    .header-logo .material-symbols-outlined { font-size: 18px; }
    .header-brand-name {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(90deg, var(--color-primary), var(--color-mid));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── Tabs: Minhas Galerias | Explorar ── */
    .header-tabs {
      display: flex; align-items: center; gap: 4px;
      background: rgba(var(--rgb-primary),.05);
      border: 1px solid rgba(var(--rgb-primary),.1);
      border-radius: 12px; padding: 4px;
      margin: 0 auto;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px;
      border: none; background: none; cursor: pointer;
      font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
      color: var(--text-dim);
      transition: background .2s, color .2s;
      white-space: nowrap;
    }
    .tab-btn .material-symbols-outlined { font-size: 16px; }
    .tab-btn.active {
      background: rgba(var(--rgb-primary),.14);
      color: var(--color-primary);
    }
    .tab-btn:not(.active):hover {
      background: rgba(var(--rgb-primary),.07);
      color: var(--text-muted);
    }

    /* Avatar do usuário logado */
    .header-user {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 5px 10px 5px 5px;
      border-radius: 999px;
      border: 1px solid rgba(var(--rgb-primary),.12);
      background: rgba(var(--rgb-primary),.04);
      transition: background .2s, border-color .2s;
      position: relative;
    }
    .header-user:hover { background: rgba(var(--rgb-primary),.09); border-color: rgba(var(--rgb-primary),.22); }
    .header-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(var(--rgb-primary),.12);
      border: 1.5px solid rgba(var(--rgb-primary),.25);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header-avatar .material-symbols-outlined { font-size: 18px; color: var(--text-dim); }
    .header-username { font-size: 14px; font-weight: 600; color: var(--text-main); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Dropdown */
    .user-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--bg-surface);
      border: 1px solid rgba(var(--rgb-primary),.14);
      border-radius: 14px; padding: 6px;
      min-width: 180px;
      box-shadow: 0 16px 40px rgba(0,0,0,.5);
      display: none; z-index: 200;
    }
    .user-dropdown.open { display: block; animation: dropIn .2s ease; }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      cursor: pointer; font-size: 14px; color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .dropdown-item:hover { background: rgba(var(--rgb-primary),.08); color: var(--color-primary); }
    .dropdown-item.danger:hover { background: rgba(255,107,107,.08); color: var(--error); }
    .dropdown-item .material-symbols-outlined { font-size: 18px; }
    .dropdown-divider { height: 1px; background: rgba(var(--rgb-primary),.08); margin: 4px 0; }

    /* ═══ CONTEÚDO PRINCIPAL ════════════════════════════════════════════ */
    .main-content {
      padding-top: calc(var(--header-h) + 28px);
      padding-bottom: 60px;
      min-height: 100dvh;
    }

    .page-header { padding: 0 20px 24px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text-main); }
    .page-header p  { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

    /* ═══ SKELETON ═══════════════════════════════════════════════════════ */
    #stateLoading { padding: 0 16px; }
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .skeleton-card {
      border-radius: 16px; overflow: hidden;
      background: rgba(var(--rgb-primary),.04);
      border: 1px solid rgba(var(--rgb-primary),.07);
    }
    .skeleton-thumb {
      height: 150px;
      background: linear-gradient(90deg,
        rgba(var(--rgb-primary),.05) 25%,
        rgba(var(--rgb-primary),.10) 50%,
        rgba(var(--rgb-primary),.05) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-info { padding: 12px; }
    .skeleton-line {
      height: 10px; border-radius: 6px; margin-bottom: 8px;
      background: linear-gradient(90deg,
        rgba(var(--rgb-primary),.05) 25%,
        rgba(var(--rgb-primary),.10) 50%,
        rgba(var(--rgb-primary),.05) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }

    /* ═══ ESTADO VAZIO ═══════════════════════════════════════════════════ */
    #stateEmpty {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; text-align: center; padding: 0 32px;
      animation: fadeIn .4s ease;
    }
    #stateEmpty.show { display: flex; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .empty-icon {
      width: 80px; height: 80px; border-radius: 24px;
      background: rgba(var(--rgb-primary),.06);
      border: 1px solid rgba(var(--rgb-primary),.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .empty-icon .material-symbols-outlined { font-size: 36px; color: var(--text-dim); }
    #stateEmpty h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    #stateEmpty p  { font-size: 14px; color: var(--text-dim); line-height: 1.6; max-width: 280px; }

    /* ═══ GRID DE CARDS ══════════════════════════════════════════════════ */
    #stateGrid { display: none; animation: fadeIn .4s ease; }
    #stateGrid.show { display: block; }

    .explore-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px;
    }

    /* Card individual */
    .explore-card {
      background: var(--bg-card);
      border: 1px solid rgba(var(--rgb-primary),.1);
      border-radius: 16px; overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: slideUp .4s cubic-bezier(.25,1,.5,1) both;
    }
    .explore-card:hover {
      transform: translateY(-3px);
      border-color: rgba(var(--rgb-primary),.25);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    /* Thumbnail */
    .card-thumb {
      width: 100%; aspect-ratio: 4/3;
      background: rgba(var(--rgb-primary),.05);
      position: relative; overflow: hidden;
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .3s ease;
    }
    .explore-card:hover .card-thumb img { transform: scale(1.05); }

    /* Placeholder quando não há foto */
    .thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--text-dim);
    }
    .thumb-placeholder .material-symbols-outlined { font-size: 32px; }
    .thumb-placeholder span:last-child { font-size: 11px; }

    /* Badge de contagem de fotos */
    .card-photo-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(7,13,31,.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(var(--rgb-primary),.15);
      border-radius: 8px; padding: 3px 8px;
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
    }
    .card-photo-badge .material-symbols-outlined { font-size: 13px; }

    /* Info abaixo da thumb */
    .card-info { padding: 12px; }
    .card-gallery-name {
      font-size: 13px; font-weight: 600; color: var(--text-main);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 8px;
    }
    /* Linha do dono: avatar + username */
    .card-owner {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none;
    }
    .card-owner:hover .card-owner-name { color: var(--color-primary); }
    .owner-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(var(--rgb-primary),.1);
      border: 1px solid rgba(var(--rgb-primary),.2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .owner-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .owner-avatar .material-symbols-outlined { font-size: 13px; color: var(--text-dim); }
    .card-owner-name {
      font-size: 12px; color: var(--text-dim); font-weight: 500;
      transition: color .15s;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid rgba(var(--rgb-primary),.18);
      border-radius: 12px; padding: 12px 20px;
      font-size: 14px; color: var(--text-main);
      box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 999;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    @media (max-width: 380px) {
      .tab-btn { padding: 7px 10px; font-size: 12px; }
      .explore-grid { gap: 8px; padding: 0 12px; }
    }
  </style>
</head>

<body>

  <!-- ── Header Fixo ── -->
  <header class="app-header">
    <!-- Logo: link para gallery.html -->
    <a class="header-brand" href="gallery.html" aria-label="Voltar para minhas galerias">
      <div class="header-logo">
        <span class="material-symbols-outlined">photo_library</span>
      </div>
      <span class="header-brand-name">Galeria</span>
    </a>

    <!-- Tabs de navegação entre as duas telas principais -->
    <div class="header-tabs" role="tablist">
      <button class="tab-btn" role="tab" onclick="window.location.href='gallery.html'" id="tabMine" aria-selected="false">
        <span class="material-symbols-outlined">grid_view</span>
        Minhas
      </button>
      <button class="tab-btn active" role="tab" id="tabExplore" aria-selected="true">
        <span class="material-symbols-outlined icon-filled">explore</span>
        Explorar
      </button>
    </div>

    <!-- Avatar + username do usuário logado -->
    <div class="header-user" id="headerUser" onclick="toggleDropdown()">
      <div class="header-avatar" id="headerAvatar">
        <span class="material-symbols-outlined">person</span>
      </div>
      <span class="header-username" id="headerUsername">…</span>
      <div class="user-dropdown" id="userDropdown">
        <div class="dropdown-item" onclick="window.location.href='profile.html'">
          <span class="material-symbols-outlined">manage_accounts</span>
          Meu perfil
        </div>
        <div class="dropdown-item" onclick="window.location.href='gallery.html'">
          <span class="material-symbols-outlined">grid_view</span>
          Minhas galerias
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="handleLogout()">
          <span class="material-symbols-outlined">logout</span>
          Sair
        </div>
      </div>
    </div>
  </header>

  <!-- ── Conteúdo Principal ── -->
  <main class="main-content">

    <div class="page-header">
      <h1>Explorar</h1>
      <p>Galerias públicas de outros usuários</p>
    </div>

    <!-- ── Estado 1: Skeleton de carregamento ── -->
    <div id="stateLoading">
      <div class="skeleton-grid">
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line" style="width:40%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line" style="width:75%"></div><div class="skeleton-line" style="width:55%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line" style="width:65%"></div><div class="skeleton-line" style="width:45%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line" style="width:55%"></div><div class="skeleton-line" style="width:40%"></div></div></div>
      </div>
    </div>

    <!-- ── Estado 2: Nenhuma galeria pública ── -->
    <div id="stateEmpty">
      <div class="empty-icon">
        <span class="material-symbols-outlined">explore_off</span>
      </div>
      <h2>Nada por aqui ainda</h2>
      <p>Nenhuma galeria pública foi criada ainda. Seja o primeiro!</p>
    </div>

    <!-- ── Estado 3: Grid de cards ── -->
    <div id="stateGrid">
      <div class="explore-grid" id="exploreGrid">
        <!-- Cards inseridos pelo JS -->
      </div>
    </div>

  </main>

  <div id="toast"></div>

  <!--
    ══════════════════════════════════════════════════════
    JAVASCRIPT — LÓGICA DO EXPLORAR
    ══════════════════════════════════════════════════════
  -->
  <script type="module">
    // ─── Aplicar cor de fundo cacheada imediatamente (evita flash de cor padrão) ─
    (function() {
      const cached = localStorage.getItem('gal_bg');
      if (cached) document.documentElement.style.setProperty('--bg-main', cached);
    })();
    import { auth, db } from './js/firebase-config.js';
    import {
      onAuthStateChanged,  // observa estado de login
      signOut              // logout
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection, query, where,
      getDocs, getDoc, doc,
      orderBy, limit          // queries no Firestore
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ─── Estado ─────────────────────────────────────────────────────────
    let loggedUser = null;  // usuário Firebase autenticado

    // ─── Cor de Fundo ─────────────────────────────────────────────────
    function applyBgColor(hex) {
      if (!hex) return;
      document.documentElement.style.setProperty('--bg-main', hex);
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      document.querySelectorAll('.app-header').forEach(el => el.style.background = `rgba(${r},${g},${b},0.85)`);
      localStorage.setItem('gal_bg', hex);
    }

    // ─── Auth Guard ──────────────────────────────────────────────────────
    // Exige que o visitante esteja logado para ver o feed
    onAuthStateChanged(auth, async (user) => {
      if (!user || !user.emailVerified) {
        window.location.replace('auth.html');
        return;
      }
      loggedUser = user;
      renderLoggedUserHeader(); // preenche avatar/username no header
      await loadExplore();      // carrega as galerias públicas
    });

    // ─── Preenche o header com os dados do usuário logado ────────────────
    async function renderLoggedUserHeader() {
      try {
        const snap = await getDoc(doc(db, 'users', loggedUser.uid));
        if (!snap.exists()) return;
        const p = snap.data();
        document.getElementById('headerUsername').textContent = p.username || '…';
        if (p.photoURL) {
          document.getElementById('headerAvatar').innerHTML = `<img src="${p.photoURL}" alt="Avatar">`;
        }
        // Sincroniza a cor de fundo com o Firestore
        if (p.bgColor) applyBgColor(p.bgColor);
      } catch (e) { console.error(e); }
    }

    // ─── Carrega as galerias públicas ────────────────────────────────────
    async function loadExplore() {
      try {
        // Busca até 40 galerias públicas, ordenadas pelas mais recentes.
        // NOTA: orderBy num campo diferente do where pode exigir índice composto
        // no Firebase Console. Se der erro de índice, remova o orderBy.
        const q = query(
          collection(db, 'galleries'),
          where('isPrivate', '==', false),
          orderBy('createdAt', 'desc'),
          limit(40)
        );
        const galSnap = await getDocs(q);

        // Esconde o skeleton
        document.getElementById('stateLoading').style.display = 'none';

        // Sem galerias → estado vazio
        if (galSnap.empty) {
          document.getElementById('stateEmpty').classList.add('show');
          return;
        }

        // Mostra o grid
        document.getElementById('stateGrid').classList.add('show');
        const gridEl = document.getElementById('exploreGrid');

        // Para cada galeria busca thumbnail e dados do dono em paralelo
        const cards = await Promise.all(galSnap.docs.map(async (galDoc, idx) => {
          const gal = galDoc.data();

          // Busca a primeira foto (thumbnail) e total de fotos da galeria
          let thumbUrl   = null;
          let photoCount = 0;
          try {
            const firstPhotoSnap = await getDocs(
              query(collection(db, 'photos'), where('galleryId', '==', galDoc.id), limit(1))
            );
            if (!firstPhotoSnap.empty) thumbUrl = firstPhotoSnap.docs[0].data().url;

            // Conta o total de fotos (sem orderBy para evitar índice)
            const allPhotosSnap = await getDocs(
              query(collection(db, 'photos'), where('galleryId', '==', galDoc.id))
            );
            photoCount = allPhotosSnap.size;
          } catch(e) { /* ignora erros de foto individual */ }

          // Busca dados do dono (avatar + username)
          let ownerUsername = '…';
          let ownerPhotoURL = null;
          try {
            const ownerSnap = await getDoc(doc(db, 'users', gal.ownerId));
            if (ownerSnap.exists()) {
              const ownerData  = ownerSnap.data();
              ownerUsername    = ownerData.username  || '…';
              ownerPhotoURL    = ownerData.photoURL  || null;
            }
          } catch(e) { /* ignora erros de perfil */ }

          return { galDoc, gal, thumbUrl, photoCount, ownerUsername, ownerPhotoURL, idx };
        }));

        // Renderiza os cards no DOM
        cards.forEach(({ galDoc, gal, thumbUrl, photoCount, ownerUsername, ownerPhotoURL, idx }) => {
          const card = document.createElement('div');
          card.className = 'explore-card';
          card.style.animationDelay = `${idx * 40}ms`; // entrada escalonada

          // HTML do avatar do dono
          const avatarHtml = ownerPhotoURL
            ? `<img src="${escHtml(ownerPhotoURL)}" alt="${escHtml(ownerUsername)}">`
            : `<span class="material-symbols-outlined">person</span>`;

          // Thumbnail: imagem real ou placeholder
          const thumbHtml = thumbUrl
            ? `<img src="${escHtml(thumbUrl)}" alt="${escHtml(gal.name)}" loading="lazy">`
            : `<div class="thumb-placeholder">
                 <span class="material-symbols-outlined">photo_library</span>
                 <span>Sem fotos</span>
               </div>`;

          card.innerHTML = `
            <div class="card-thumb">
              ${thumbHtml}
              ${photoCount > 0 ? `
                <div class="card-photo-badge">
                  <span class="material-symbols-outlined">photo</span>
                  ${photoCount}
                </div>` : ''}
            </div>
            <div class="card-info">
              <div class="card-gallery-name">${escHtml(gal.name)}</div>
              <a class="card-owner"
                 href="public_profile.html?user=${encodeURIComponent(ownerUsername)}"
                 onclick="event.stopPropagation()"
                 aria-label="Ver perfil de ${escHtml(ownerUsername)}">
                <div class="owner-avatar">${avatarHtml}</div>
                <span class="card-owner-name">@${escHtml(ownerUsername)}</span>
              </a>
            </div>`;

          // Clique no card → vai para o perfil público do dono
          card.addEventListener('click', () => {
            window.location.href = `public_profile.html?user=${encodeURIComponent(ownerUsername)}`;
          });

          gridEl.appendChild(card);
        });

      } catch (e) {
        console.error('Erro ao carregar galerias:', e);
        document.getElementById('stateLoading').style.display = 'none';
        // Se o erro for de índice faltando, mostra mensagem específica
        if (e.code === 'failed-precondition') {
          toast('Configure o índice no Firebase Console e tente novamente.');
        } else {
          toast('Erro ao carregar galerias. Tente novamente.');
        }
      }
    }

    // ─── Dropdown ────────────────────────────────────────────────────────
    window.toggleDropdown = function() {
      document.getElementById('userDropdown').classList.toggle('open');
    };
    document.addEventListener('click', (e) => {
      if (!document.getElementById('headerUser').contains(e.target)) {
        document.getElementById('userDropdown').classList.remove('open');
      }
    });

    // ─── Logout ──────────────────────────────────────────────────────────
    window.handleLogout = async function() {
      await signOut(auth);
      window.location.replace('auth.html');
    };

    // ─── Proteção XSS ────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ─── Toast ───────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
      clearTimeout(toastTimer);
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }
  </script>

</body>
</html>
