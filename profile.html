<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Galeria</title>
  <meta name="description" content="Seu perfil na Galeria">

  <!--
    ══════════════════════════════════════════════════════
    profile.html — TELA DE PERFIL DO USUÁRIO
    ══════════════════════════════════════════════════════
    Esta página permite ao usuário:
      • Ver suas informações (avatar, username, bio, privacidade)
      • Editar username, bio, data de nascimento e privacidade
      • Trocar a foto de perfil instantaneamente
      • Ver estatísticas (galerias, fotos, data de membro)
      • Excluir a conta com confirmação dupla
      • Fazer logout

    Estrutura visual:
    ┌─────────────────────────────────────────────────┐
    │  [← Galeria]   Meu Perfil   [Sair]   ← header  │
    │                                                  │
    │  ┌──────────────────────────────────────────┐   │
    │  │  Avatar  |  Username  |  Bio  |  Privac. │   │
    │  │  Estatísticas: Galerias | Fotos | Membro │   │
    │  │  [Formulário de edição — oculto por pad.]│   │
    │  └──────────────────────────────────────────┘   │
    │                                                  │
    │  ┌──────────────────────────────────────────┐   │
    │  │  ⚠ Zona de perigo: [Excluir minha conta] │   │
    │  └──────────────────────────────────────────┘   │
    └─────────────────────────────────────────────────┘
  -->

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <style>
    /* ═══ VARIÁVEIS DE COR ════════════════════════════════════════════ */
    :root {
      --bg-main:      #070d1f;
      --bg-surface:   #0c1324;
      --bg-card:      #131929;
      --color-primary:#adc6ff;
      --color-mid:    #748de1;
      --color-deep:   #4b8eff;
      --text-main:    #dce1fb;
      --text-muted:   #c1c6d7;
      --text-dim:     #8b90a0;
      --rgb-primary:  173,198,255;
      --rgb-mid:      116,141,225;
      --error:        #ff6b6b;
      --success:      #4ade80;
      --header-h:     64px; /* altura fixa do header — usada para padding do conteúdo */
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Esconde barras de scroll (visual limpo) */
    * { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100dvh;
      overflow-x: hidden; /* impede scroll horizontal */
    }
    /* Configurações dos ícones Material */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
      user-select: none; line-height: 1; vertical-align: middle;
    }

    /* ═══ HEADER FIXO ══════════════════════════════════════════════════
       Fica sempre visível no topo enquanto o usuário rola a página.
    ═══════════════════════════════════════════════════════════════════ */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(7,13,31,0.85); /* fundo semitransparente */
      backdrop-filter: blur(20px);    /* efeito glass blur */
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(var(--rgb-primary),0.1);
      display: flex; align-items: center;
      padding: 0 20px; gap: 14px; z-index: 100; /* z-index alto: fica acima do conteúdo */
    }
    /* Botão "← Galeria" no header */
    .btn-back-header {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 6px 10px; border-radius: 10px;
      transition: color .2s, background .2s;
    }
    .btn-back-header:hover { color: var(--color-primary); background: rgba(var(--rgb-primary),.07); }
    .btn-back-header .material-symbols-outlined { font-size: 20px; }
    .header-title { font-size: 16px; font-weight: 700; flex: 1; } /* ocupa o espaço do meio */

    /* ═══ CONTEÚDO PRINCIPAL ══════════════════════════════════════════
       padding-top = altura do header + 32px para não ficar por baixo dele.
    ═══════════════════════════════════════════════════════════════════ */
    .main-content {
      padding-top: calc(var(--header-h) + 32px);
      padding-bottom: 60px;
      max-width: 560px;
      margin: 0 auto;   /* centraliza horizontalmente */
      padding-left: 20px;
      padding-right: 20px;
    }

    /* ═══ CARD DO PERFIL ══════════════════════════════════════════════
       Caixa de vidro (glassmorphism) que contém todas as informações.
    ═══════════════════════════════════════════════════════════════════ */
    .profile-card {
      background: rgba(12,19,36,.75);
      border: 1px solid rgba(var(--rgb-primary),.12);
      border-radius: 24px;
      padding: 32px 24px;
      backdrop-filter: blur(20px);
      margin-bottom: 20px;
      animation: slideUp .4s cubic-bezier(.25,1,.5,1) both;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    /* ═══ SEÇÃO DO AVATAR ═════════════════════════════════════════════ */
    .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
    .avatar-ring    { position: relative; margin-bottom: 16px; } /* "relative" para posicionar o botão câmera */
    /* Círculo da foto */
    .avatar-img {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(var(--rgb-primary),.3);
      box-shadow: 0 0 30px rgba(var(--rgb-primary),.12); /* brilho sutil */
      background: rgba(var(--rgb-primary),.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
    /* Ícone "person" quando não tem foto */
    .avatar-img .no-photo { font-size: 48px; color: var(--text-dim); }
    /* Botão câmera sobreposto no avatar (canto inferior direito) */
    .avatar-cam-btn {
      position: absolute; bottom: 3px; right: 3px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--color-deep); border: 2px solid var(--bg-main);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
      transition: transform .2s, background .2s;
    }
    .avatar-cam-btn:hover { transform: scale(1.1); }
    .avatar-cam-btn .material-symbols-outlined { font-size: 14px; font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
    /* Estado de carregamento: opacidade e sem cliques */
    .avatar-uploading { opacity: .6; pointer-events: none; }

    /* Textos do perfil no modo de visualização */
    .display-name     { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .display-username { font-size: 14px; color: var(--color-primary); font-weight: 500; margin-bottom: 8px; }
    .display-bio      { font-size: 14px; color: var(--text-dim); text-align: center; line-height: 1.55; max-width: 320px; }

    /* Badge de privacidade (🔒 Perfil privado / 🔓 Perfil público) */
    .privacy-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(var(--rgb-primary),.07);
      border: 1px solid rgba(var(--rgb-primary),.12);
      border-radius: 999px; padding: 3px 10px;
      font-size: 12px; color: var(--text-dim);
      margin-top: 10px;
    }
    .privacy-badge .material-symbols-outlined { font-size: 13px; }

    /* ═══ ESTATÍSTICAS ════════════════════════════════════════════════
       Grid com 3 colunas: Galerias | Fotos | Membro desde
    ═══════════════════════════════════════════════════════════════════ */
    .stats-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; margin: 24px 0;
    }
    .stat-box {
      text-align: center; padding: 14px 6px;
      background: rgba(var(--rgb-primary),.04);
      border: 1px solid rgba(var(--rgb-primary),.1);
      border-radius: 14px;
    }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--color-primary); }
    .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

    /* ═══ FORMULÁRIO DE EDIÇÃO ════════════════════════════════════════
       Oculto por padrão. Ativado com "Editar perfil" → toggleEditMode(true).
       Classe "open" o torna visível com animação.
    ═══════════════════════════════════════════════════════════════════ */
    .edit-form { display: none; }
    .edit-form.open { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* Campos do formulário */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 7px; }
    .form-group .hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon {
      position: absolute; left: 12px;
      color: var(--text-dim); font-size: 18px;
      pointer-events: none;
      font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
    }
    .field {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(var(--rgb-primary),.04);
      border: 1px solid rgba(var(--rgb-primary),.12);
      border-radius: 12px; color: var(--text-main);
      font-size: 15px; font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .field.no-icon { padding-left: 14px; }
    .field::placeholder { color: var(--text-dim); }
    .field:focus { border-color: rgba(var(--rgb-primary),.45); background: rgba(var(--rgb-primary),.07); box-shadow: 0 0 0 3px rgba(var(--rgb-primary),.08); }
    textarea.field { resize: vertical; min-height: 80px; padding: 12px 14px; line-height: 1.5; }
    .char-count { font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 4px; }
    /* Status do username (verificando / disponível / em uso) */
    .username-status          { font-size: 12px; margin-top: 5px; }
    .username-status.checking  { color: var(--text-dim); }
    .username-status.available { color: var(--success); }
    .username-status.taken     { color: var(--error); }

    /* ═══ TOGGLE DE PRIVACIDADE ═══════════════════════════════════════ */
    .toggle-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .toggle-item  {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      background: rgba(var(--rgb-primary),.04);
      border: 1px solid rgba(var(--rgb-primary),.1);
      border-radius: 12px; gap: 14px;
    }
    .toggle-info { flex: 1; }
    .toggle-info strong { font-size: 14px; font-weight: 600; color: var(--text-main); display: block; margin-bottom: 2px; }
    .toggle-info span   { font-size: 12px; color: var(--text-dim); }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: rgba(var(--rgb-primary),.12); border-radius: 24px; cursor: pointer; transition: background .3s; border: 1px solid rgba(var(--rgb-primary),.18); }
    .slider::before { content:''; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: var(--text-dim); border-radius: 50%; transition: transform .3s, background .3s; }
    input:checked + .slider { background: rgba(var(--rgb-primary),.22); border-color: rgba(var(--rgb-primary),.38); }
    input:checked + .slider::before { transform: translateX(20px); background: var(--color-primary); }

    /* Linha separadora horizontal */
    .section-divider { height: 1px; background: rgba(var(--rgb-primary),.08); margin: 22px 0; }

    /* ═══ BOTÕES ══════════════════════════════════════════════════════ */

    /* Botão principal (Salvar alterações) */
    .btn-primary {
      width: 100%; padding: 13px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--color-deep), var(--color-mid));
      color: #fff; font-size: 15px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: opacity .2s, transform .2s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(75,142,255,.3);
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* Botão secundário (Cancelar) */
    .btn-secondary {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid rgba(var(--rgb-primary),.2);
      background: transparent; color: var(--text-muted);
      font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer;
      transition: background .2s, color .2s; margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-secondary:hover { background: rgba(var(--rgb-primary),.07); color: var(--color-primary); }

    /* Botão de perigo (Excluir conta) — borda e texto vermelhos */
    .btn-danger {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,107,107,.2);
      background: rgba(255,107,107,.05); color: var(--error);
      font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer;
      transition: background .2s; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-danger:hover { background: rgba(255,107,107,.12); }

    /* Botão "Editar perfil" (pequeno, arredondado) */
    .btn-edit {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 999px;
      border: 1px solid rgba(var(--rgb-primary),.2);
      background: rgba(var(--rgb-primary),.06);
      color: var(--color-primary); font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: background .2s, border-color .2s;
      margin-top: 14px;
    }
    .btn-edit:hover { background: rgba(var(--rgb-primary),.12); border-color: rgba(var(--rgb-primary),.35); }
    .btn-edit .material-symbols-outlined { font-size: 16px; }

    /* ═══ MENSAGENS ═══════════════════════════════════════════════════ */
    .error-msg {
      background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.25);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--error);
      margin-bottom: 14px; display: none; /* oculto por padrão */
    }
    .success-msg {
      background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.25);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--success);
      margin-bottom: 14px; display: none;
    }

    /* ═══ SPINNERS ════════════════════════════════════════════════════ */
    .spinner      { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    .spinner-dark { border: 2px solid rgba(var(--rgb-primary),.2); border-top-color: var(--color-primary); } /* versão escura do spinner */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Overlay de carregamento: cobre a tela enquanto busca dados do Firebase */
    .loading-overlay { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner-lg { width: 36px; height: 36px; border: 3px solid rgba(var(--rgb-primary),.15); border-top-color: var(--color-primary); border-radius: 50%; animation: spin .8s linear infinite; }

    /* ═══ TOAST (notificação flutuante) ══════════════════════════════
       Aparece na parte inferior da tela por 3 segundos.
       Controlado pela função toast() no JS.
    ═══════════════════════════════════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid rgba(var(--rgb-primary),.18);
      border-radius: 12px; padding: 12px 20px; font-size: 14px; color: var(--text-main);
      box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 999;
      opacity: 0; transition: opacity .3s;    /* animação de fade */
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; } /* classe adicionada/removida pelo JS */

    /* Responsividade para telas muito pequenas */
    @media (max-width: 420px) {
      .main-content { padding-left: 14px; padding-right: 14px; }
      .profile-card { padding: 24px 18px; }
    }
  </style>
</head>

<body>
  <!-- Overlay de carregamento: visível enquanto busca o perfil no Firebase -->
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner-lg"></div></div>

  <!-- ── Header Fixo ── -->
  <header class="app-header">
    <!-- Botão voltar para a galeria -->
    <button class="btn-back-header" onclick="window.location.href='gallery.html'">
      <span class="material-symbols-outlined">arrow_back</span>
      Galeria
    </button>
    <span class="header-title">Meu Perfil</span>
    <!-- Botão de logout no header (width:auto sobrescreve o width:100% padrão do .btn-secondary) -->
    <button class="btn-secondary" style="width:auto;padding:7px 14px;margin-top:0;font-size:13px" onclick="handleLogout()">
      <span class="material-symbols-outlined" style="font-size:16px">logout</span>
      Sair
    </button>
  </header>

  <!-- ── Conteúdo Principal (oculto até os dados carregarem) ── -->
  <main class="main-content" id="mainContent" style="display:none">

    <!-- ── Card Principal do Perfil ── -->
    <div class="profile-card">

      <!-- ── Avatar + Informações de Exibição ── -->
      <div class="avatar-section">
        <div class="avatar-ring" id="avatarRing">
          <!-- Área do avatar: exibe ícone "person" por padrão, substituído pela foto -->
          <div class="avatar-img" id="avatarDisplay">
            <span class="material-symbols-outlined no-photo">person</span>
          </div>
          <!-- Botão câmera: aciona o input de arquivo oculto -->
          <button class="avatar-cam-btn" onclick="document.getElementById('avatarFileInput').click()" id="avatarCamBtn" aria-label="Trocar foto">
            <span class="material-symbols-outlined">photo_camera</span>
          </button>
        </div>
        <!-- Input de arquivo real (oculto, acionado pelo botão câmera) -->
        <input type="file" id="avatarFileInput" accept="image/*" style="display:none">

        <!-- Modo de visualização (aparece quando NÃO está editando) -->
        <div id="viewMode">
          <div class="display-name"     id="displayName">—</div>
          <div class="display-username" id="displayUsername">@usuário</div>
          <div class="display-bio"      id="displayBio"></div>
          <!-- Badge de privacidade: ícone e texto atualizados pelo JS -->
          <div class="privacy-badge" id="privacyBadge">
            <span class="material-symbols-outlined" id="privacyBadgeIcon">lock_open</span>
            <span id="privacyBadgeText">Perfil público</span>
          </div>
          <!-- Botão que abre o formulário de edição -->
          <button class="btn-edit" onclick="toggleEditMode(true)">
            <span class="material-symbols-outlined">edit</span>
            Editar perfil
          </button>
          <!-- Botão que abre o perfil público em nova aba (visível apenas quando público) -->
          <button class="btn-edit" id="btnViewPublic" style="margin-top:8px;border-color:rgba(var(--rgb-primary),.15)" onclick="viewPublicProfile()">
            <span class="material-symbols-outlined">open_in_new</span>
            Ver como público
          </button>
        </div>
      </div>

      <!-- ── Estatísticas ── -->
      <div class="stats-row" id="statsRow">
        <!-- Número de galerias criadas -->
        <div class="stat-box">
          <div class="stat-value" id="statGalleries">0</div>
          <div class="stat-label">Galerias</div>
        </div>
        <!-- Total de fotos em todas as galerias -->
        <div class="stat-box">
          <div class="stat-value" id="statPhotos">0</div>
          <div class="stat-label">Fotos</div>
        </div>
        <!-- Data de criação da conta (ex: "jan 2024") -->
        <div class="stat-box">
          <div class="stat-value" id="statMember">—</div>
          <div class="stat-label">Membro desde</div>
        </div>
      </div>

      <!-- ── Formulário de Edição (oculto por padrão) ── -->
      <div class="edit-form" id="editForm">
        <!-- Linha separadora visual -->
        <div class="section-divider"></div>

        <!-- Mensagens de feedback (aparecem conforme ação) -->
        <div class="error-msg"   id="editError"></div>
        <div class="success-msg" id="editSuccess"></div>

        <!-- Campo: Nome de usuário -->
        <div class="form-group">
          <label for="editUsername">Nome de usuário <span style="color:var(--error)">*</span></label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">alternate_email</span>
            <input type="text" id="editUsername" class="field" maxlength="30" autocomplete="off" spellcheck="false">
          </div>
          <!-- Status de disponibilidade (atualizado pelo JS em tempo real) -->
          <div class="username-status" id="usernameStatus"></div>
          <div class="hint">3–30 caracteres. Letras, números, _ e .</div>
        </div>

        <!-- Campo: Bio -->
        <div class="form-group">
          <label for="editBio">Bio</label>
          <textarea id="editBio" class="field no-icon" maxlength="200" rows="3" placeholder="Uma pequena apresentação…"></textarea>
          <!-- Contador de caracteres (ex: "45 / 200") -->
          <div class="char-count" id="bioCount">0 / 200</div>
        </div>

        <!-- Campo: Data de nascimento -->
        <div class="form-group">
          <label for="editBirthDate">Data de nascimento</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">cake</span>
            <input type="date" id="editBirthDate" class="field">
          </div>
        </div>

        <!-- Separador + seção de privacidade -->
        <div class="section-divider"></div>
        <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px">Privacidade</div>

        <!-- Toggle de privacidade do perfil -->
        <div class="toggle-group">
          <div class="toggle-item">
            <div class="toggle-info">
              <strong>Perfil privado</strong>
              <span>Somente aprovados podem ver seu perfil</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="editPrivateProfile">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Botão de salvar com spinner -->
        <button class="btn-primary" id="btnSaveProfile" onclick="saveProfile()">
          <span id="saveBtnText">Salvar alterações</span>
          <span id="saveBtnLoader" style="display:none"><span class="spinner"></span></span>
        </button>
        <!-- Cancelar edição: fecha o formulário sem salvar -->
        <button class="btn-secondary" onclick="toggleEditMode(false)">Cancelar</button>
      </div>

    </div><!-- /profile-card -->

    <!-- ── Zona de Perigo ── -->
    <!-- Border vermelha sutil para diferenciar desta área -->
    <div class="profile-card" style="border-color:rgba(255,107,107,.15)">
      <div style="font-size:14px;font-weight:700;color:var(--error);margin-bottom:14px;display:flex;align-items:center;gap:8px">
        <span class="material-symbols-outlined" style="font-size:18px">warning</span>
        Zona de perigo
      </div>
      <!-- Botão de exclusão: pede confirmação dupla antes de deletar -->
      <button class="btn-danger" onclick="confirmDeleteAccount()">
        <span class="material-symbols-outlined" style="font-size:16px">delete_forever</span>
        Excluir minha conta
      </button>
    </div>

  </main>

  <!-- Toast de notificação (mensagem flutuante temporária) -->
  <div id="toast"></div>

  <!--
    ══════════════════════════════════════════════════════
    JAVASCRIPT — LÓGICA DO PERFIL
    ══════════════════════════════════════════════════════
  -->
  <script type="module">
    import { auth, db, storage } from './js/firebase-config.js';
    import {
      onAuthStateChanged,     // observa mudança de estado de login
      signOut,                // faz logout
      deleteUser,             // deleta o usuário do Firebase Auth
      EmailAuthProvider,      // para reautenticação (não usado diretamente aqui)
      reauthenticateWithCredential // reautenticação antes de deletar (reservado)
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc, getDoc, updateDoc, setDoc, // ler e atualizar documentos
      collection, query, where,
      getDocs, limit,                  // consultar coleções
      serverTimestamp,                 // timestamp do servidor
      deleteDoc, writeBatch           // deletar documentos e operações em lote
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      ref, uploadBytes, getDownloadURL, deleteObject // Storage: upload, download URL, deletar
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // ─── Estado ─────────────────────────────────────────────────────────
    let currentUser      = null;  // usuário Firebase autenticado
    let userProfile      = null;  // dados do perfil do Firestore
    let usernameOk       = true;  // true se o username é válido para salvar
    let usernameTimer    = null;  // timer para debounce da verificação
    let originalUsername = '';    // username atual (para não precisar verificar se não mudou)

    // ─── Auth Guard ──────────────────────────────────────────────────────
    // Redireciona para auth se não estiver logado ou e-mail não verificado
    onAuthStateChanged(auth, async (user) => {
      if (!user || !user.emailVerified) { window.location.replace('auth.html'); return; }
      currentUser = user;
      await loadProfile(); // carrega os dados do perfil
      hideLoading();       // esconde o overlay e mostra o conteúdo
    });

    // Carrega o perfil do usuário do Firestore
    async function loadProfile() {
      try {
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        // Se o documento não existe, volta para o onboarding (não deveria acontecer)
        if (!snap.exists()) { window.location.replace('onboarding.html'); return; }
        userProfile      = snap.data();
        originalUsername = userProfile.username || '';
        renderProfile(); // renderiza os dados na tela
        await loadStats(); // carrega as estatísticas (async, pode demorar um pouco)
      } catch (e) { console.error(e); }
    }

    // ─── Renderização do Perfil ──────────────────────────────────────────
    // Preenche todos os elementos HTML com os dados do userProfile
    function renderProfile() {
      const p = userProfile;

      // Avatar: se tiver foto, substitui o ícone "person" por uma <img>
      if (p.photoURL) {
        document.getElementById('avatarDisplay').innerHTML = `<img src="${p.photoURL}" alt="Avatar">`;
      }

      // Modo de visualização
      document.getElementById('displayName').textContent     = p.username || '—';
      document.getElementById('displayUsername').textContent = '@' + (p.username || '');
      document.getElementById('displayBio').textContent      = p.bio || '';

      // Badge de privacidade: ícone e texto mudam conforme isProfilePrivate
      const isPrivate = !!p.isProfilePrivate; // !! converte para boolean
      document.getElementById('privacyBadgeIcon').textContent = isPrivate ? 'lock' : 'lock_open';
      document.getElementById('privacyBadgeText').textContent = isPrivate ? 'Perfil privado' : 'Perfil público';
      // Botão "Ver como público": só aparece quando o perfil não é privado
      document.getElementById('btnViewPublic').style.display  = isPrivate ? 'none' : 'flex';

      // Preenche o formulário de edição com os valores atuais
      document.getElementById('editUsername').value              = p.username || '';
      document.getElementById('editBio').value                  = p.bio || '';
      document.getElementById('editBirthDate').value            = p.birthDate || '';
      document.getElementById('editPrivateProfile').checked     = isPrivate;
      document.getElementById('bioCount').textContent           = `${(p.bio||'').length} / 200`;

      // Data de membro: converte timestamp Firebase para data legível
      // createdAt.seconds é o Unix timestamp (segundos desde 1970)
      if (p.createdAt?.seconds) {
        const d = new Date(p.createdAt.seconds * 1000); // converte para millisegundos
        document.getElementById('statMember').textContent =
          d.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' }); // ex: "jan 2024"
      }

      // Impede seleção de datas futuras no campo de nascimento
      document.getElementById('editBirthDate').max = new Date().toISOString().split('T')[0];
    }

    // ─── Estatísticas ────────────────────────────────────────────────────
    // Conta galerias e fotos do usuário no Firestore
    async function loadStats() {
      try {
        // Busca todas as galerias onde ownerId == uid do usuário
        const galSnap = await getDocs(
          query(collection(db,'galleries'), where('ownerId','==',currentUser.uid))
        );
        document.getElementById('statGalleries').textContent = galSnap.size; // total de galerias

        // Para cada galeria, conta as fotos
        let photoCount = 0;
        for (const galDoc of galSnap.docs) {
          // Busca fotos onde galleryId == id da galeria
          const pSnap = await getDocs(
            query(collection(db,'photos'), where('galleryId','==',galDoc.id))
          );
          photoCount += pSnap.size;
        }
        document.getElementById('statPhotos').textContent = photoCount;
      } catch (e) { console.error(e); }
    }

    // ─── Modo de Edição ──────────────────────────────────────────────────
    // open=true  → abre o formulário de edição
    // open=false → fecha o formulário de edição
    window.toggleEditMode = function(open) {
      document.getElementById('editForm').classList.toggle('open', open);
      // Semitransparente quando editando (foco no formulário)
      document.getElementById('viewMode').style.opacity = open ? '0.5' : '1';
      // Rola para o formulário de edição quando abrir
      if (open) document.getElementById('editForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    // Abre o perfil público do próprio usuário em uma nova aba
    // Permite que o dono veja como visitantes vêem seu perfil
    window.viewPublicProfile = function() {
      const username = userProfile?.username;
      if (!username) return;
      window.open(`public_profile.html?user=${encodeURIComponent(username)}`, '_blank');
    };

    // ─── Verificação de Username em Tempo Real ───────────────────────────
    // Idêntica à do onboarding.html, mas com uma otimização:
    // se o username não mudou, marca como OK sem consultar o Firestore.
    document.getElementById('editUsername').addEventListener('input', (e) => {
      const val       = e.target.value.trim().toLowerCase();
      const sanitized = val.replace(/[^a-z0-9_.]/g,'');
      if (e.target.value !== sanitized) e.target.value = sanitized;

      const status = document.getElementById('usernameStatus');
      clearTimeout(usernameTimer);

      if (!sanitized || sanitized.length < 3) { status.textContent = ''; usernameOk = false; return; }

      // Otimização: se o username não mudou, não precisa verificar
      if (sanitized === originalUsername) { status.textContent = ''; usernameOk = true; return; }

      status.className  = 'username-status checking';
      status.textContent = 'Verificando…';

      // Aguarda 600ms antes de consultar (debounce)
      usernameTimer = setTimeout(async () => {
        // limit(1) → busca apenas 1 resultado (mais eficiente)
        const q    = query(collection(db,'users'), where('username','==',sanitized), limit(1));
        const snap = await getDocs(q);
        // Considera disponível se: não encontrou nenhum OU o único encontrado é o próprio usuário
        if (snap.empty || snap.docs[0].id === currentUser.uid) {
          status.className = 'username-status available';
          status.innerHTML = '✓ Disponível';
          usernameOk = true;
        } else {
          status.className = 'username-status taken';
          status.innerHTML = '✕ Já está em uso';
          usernameOk = false;
        }
      }, 600);
    });

    // Contador de caracteres da bio
    document.getElementById('editBio').addEventListener('input', (e) => {
      document.getElementById('bioCount').textContent = `${e.target.value.length} / 200`;
    });

    // ─── Salvar Alterações do Perfil ─────────────────────────────────────
    window.saveProfile = async function() {
      hideMsg();
      const username = document.getElementById('editUsername').value.trim().toLowerCase();
      if (!username || username.length < 3) { showError('Nome de usuário deve ter pelo menos 3 caracteres.'); return; }
      if (!usernameOk) { showError('Verifique o nome de usuário.'); return; }

      setBtnLoading(true); // mostra spinner no botão

      try {
        const bio       = document.getElementById('editBio').value.trim();
        const birthDate = document.getElementById('editBirthDate').value;
        const isPrivate = document.getElementById('editPrivateProfile').checked;

        // Atualiza apenas os campos específicos (updateDoc em vez de setDoc)
        // Isso preserva outros campos como createdAt, galleriesCount, etc.
        await updateDoc(doc(db,'users',currentUser.uid), {
          username,
          bio,
          birthDate: birthDate || null,
          isProfilePrivate: isPrivate,
          updatedAt: serverTimestamp(), // atualiza o timestamp
        });

        // Atualiza o estado local (evita buscar o documento novamente)
        originalUsername = username;
        userProfile = { ...userProfile, username, bio, birthDate, isProfilePrivate: isPrivate };
        renderProfile();       // re-renderiza a visualização
        toggleEditMode(false); // fecha o formulário
        showSuccess('Perfil atualizado!');
        toast('Perfil salvo com sucesso!'); // notificação flutuante
      } catch (e) {
        showError('Erro ao salvar. Tente novamente.');
        console.error(e);
      }
      setBtnLoading(false);
    };

    // ─── Upload de Avatar ────────────────────────────────────────────────
    // Acionado quando o usuário seleciona uma nova foto
    document.getElementById('avatarFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !currentUser) return;
      if (file.size > 5 * 1024 * 1024) { toast('Máximo 5MB para foto de perfil.'); return; }

      const avatarDisplay = document.getElementById('avatarDisplay');
      const camBtn        = document.getElementById('avatarCamBtn');

      // Estado de carregamento: semitransparente e não clicável
      avatarDisplay.classList.add('avatar-uploading');
      camBtn.disabled = true;

      try {
        // Upload para Firebase Storage no caminho "avatars/{uid}"
        // Usar o UID como nome garante que cada usuário tenha só 1 avatar (sobrescreve o anterior)
        const storageRef = ref(storage, `avatars/${currentUser.uid}`);
        const snap = await uploadBytes(storageRef, file);
        const url  = await getDownloadURL(snap.ref); // URL pública do arquivo

        // Atualiza o documento do usuário com a nova URL da foto
        await updateDoc(doc(db,'users',currentUser.uid), { photoURL: url, updatedAt: serverTimestamp() });

        // Atualiza a exibição instantaneamente (sem recarregar)
        avatarDisplay.innerHTML = `<img src="${url}" alt="Avatar">`;
        userProfile.photoURL    = url; // atualiza o estado local

        toast('Foto atualizada!');
      } catch { toast('Erro ao enviar foto.'); }

      // Remove o estado de carregamento
      avatarDisplay.classList.remove('avatar-uploading');
      camBtn.disabled = false;
    });

    // ─── Exclusão de Conta ────────────────────────────────────────────────
    // Confirmação DUPLA antes de excluir:
    // 1. Confirm dialog: avisa o que vai acontecer
    // 2. Prompt dialog: pede digitar "EXCLUIR" para confirmar
    window.confirmDeleteAccount = function() {
      const confirmed = confirm('⚠️ Sua conta, galerias e fotos serão excluídas permanentemente.\n\nDigite "EXCLUIR" na próxima janela para confirmar.');
      if (!confirmed) return;
      const input = prompt('Digite EXCLUIR para confirmar:');
      if (input !== 'EXCLUIR') { toast('Ação cancelada.'); return; }
      deleteAccount(); // executa a exclusão
    };

    // Executa a exclusão em cascata: photos → galerias → avatar → doc do usuário → conta Auth
    async function deleteAccount() {
      try {
        // 1. Para cada galeria do usuário
        const galSnap = await getDocs(
          query(collection(db,'galleries'), where('ownerId','==',currentUser.uid))
        );
        for (const galDoc of galSnap.docs) {
          // 2. Para cada foto da galeria
          const photoSnap = await getDocs(
            query(collection(db,'photos'), where('galleryId','==',galDoc.id))
          );
          for (const pDoc of photoSnap.docs) {
            const data = pDoc.data();
            // 3. Deleta o arquivo do Storage (ignora erro se não existir)
            if (data.storagePath) await deleteObject(ref(storage, data.storagePath)).catch(() => {});
            // 4. Deleta o documento da foto no Firestore
            await deleteDoc(pDoc.ref);
          }
          // 5. Deleta o documento da galeria
          await deleteDoc(galDoc.ref);
        }

        // 6. Deleta o avatar do Storage (ignora erro)
        if (userProfile.photoURL) await deleteObject(ref(storage, `avatars/${currentUser.uid}`)).catch(() => {});

        // 7. Deleta o documento do usuário no Firestore
        await deleteDoc(doc(db,'users',currentUser.uid));

        // 8. Deleta a conta de autenticação (Firebase Auth)
        // NOTA: Se o login foi há muito tempo, pode lançar "requires-recent-login"
        await deleteUser(currentUser);

        // 9. Redireciona para a tela de login
        window.location.replace('auth.html');
      } catch (e) {
        toast('Erro ao excluir conta. Faça login novamente e tente de novo.');
        console.error(e);
      }
    }

    // ─── Logout ──────────────────────────────────────────────────────────
    window.handleLogout = async function() {
      await signOut(auth);
      window.location.replace('auth.html');
    };

    // ─── Helpers de UI ───────────────────────────────────────────────────

    // Mostra/oculta spinner no botão de salvar
    function setBtnLoading(loading) {
      document.getElementById('saveBtnText').style.display   = loading ? 'none' : '';
      document.getElementById('saveBtnLoader').style.display = loading ? '' : 'none';
      document.getElementById('btnSaveProfile').disabled     = loading;
    }

    // Exibe mensagem de erro dentro do formulário
    function showError(msg)   { const el = document.getElementById('editError');   el.textContent = msg; el.style.display = 'block'; }
    // Exibe mensagem de sucesso dentro do formulário
    function showSuccess(msg) { const el = document.getElementById('editSuccess'); el.textContent = msg; el.style.display = 'block'; }
    // Esconde ambas as mensagens
    function hideMsg() {
      document.getElementById('editError').style.display   = 'none';
      document.getElementById('editSuccess').style.display = 'none';
    }

    // Esconde o overlay de carregamento e mostra o conteúdo
    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display    = 'block';
    }

    // Toast: notificação flutuante que some após 3 segundos
    let toastTimer;
    function toast(msg) {
      clearTimeout(toastTimer); // cancela timer anterior (se ainda estiver ativo)
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000); // some após 3s
    }
  </script>
</body>
</html>
